<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WarCry</title>
  <style>
    body { margin: 0; background: #11151c; color: #cdd2da; font-family: system-ui, sans-serif; display: flex; }
    #controlPanel { width: 240px; padding: 14px; box-sizing: border-box; }
    #controlPanel h3 { margin: 0 0 10px; }
    .ctl { display: block; margin: 10px 0; font-size: 13px; }
    .ctl input { width: 100%; }
    button { background: #be0000; color: #fff; border: 0; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
    #status { font-size: 12px; color: #8a8f98; margin-top: 12px; }
    canvas { background: #0b0e13; display: block; }
  </style>
</head>
<body>
  <div id="controlPanel">
    <h3>WarCry</h3>
    <button onclick="reset()">New population</button>
    <div id="status"></div>
  </div>
  <canvas id="gameWorld" width="1060" height="600"></canvas>

  <!-- socket.io client (for the standard DB client in socket mode) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- sim core, in dependency order; main.js last -->
  <script src="src/util.js"></script>
  <script src="src/params.js"></script>
  <script src="src/gene.js"></script>
  <script src="src/db.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/warrior.js"></script>
  <script src="src/world.js"></script>
  <script src="src/observer.js"></script>
  <script src="src/charts.js"></script>
  <script src="src/datamanager.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
